title: sahilrajput.com # Title text on top of home page.
description: > # Description of the site for meta tags (SEO) (multiple lines allowed)
  Tech Blog by Sahil Rajput.

include:
  - ".well-known"

# We must exclude `node_modules` otherwise jekyll compiles the node_modules code as well and thus fails when we run `bundle exec jekyll serve --livereload` command.
exclude: 
 - "thoughts/thoughts-frontend/node_modules/*"
 - "node_modules"
 - "node_modules/**"

# Removing this theme because its not good but keeping here in case I need to test any other theme in future.
# remote_theme: abhinavs/moonwalk

# Learn: Default value of future is false as it allows to
#        create future posts but they will not be published
#        until the date is reached. Setting it to true will
#        publish future posts immediately, which is not
#        desired in most cases. Hence, keeping it false.
# future: false

timezone: Asia/Kolkata